name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI devops 2025"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/devops_id_rsa
          chmod 600 ~/.ssh/devops_id_rsa
          ssh-keyscan -H aymen.alloune.takima.school >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Test Ansible connectivity
        run: |
          cd ansible
          ansible all -i inventories/setup.yml -m ping

      - name: Deploy application
        run: |
          cd ansible
          ansible-playbook -i inventories/setup.yml deploy.yml

      - name: Verify deployment
        run: |
          cd ansible
          ansible all -i inventories/setup.yml -m shell -a "docker ps" --become